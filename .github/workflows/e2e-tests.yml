name: E2E Tests

on:
  workflow_call:

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm -w @glass-code-academy/web exec playwright install --with-deps

      - name: Start frontend server in background
        run: |
          npm -w @glass-code-academy/web run build
          nohup npm -w @glass-code-academy/web run start:next > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          # Wait for server to start
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

      - name: Run E2E tests
        run: npm -w @glass-code-academy/web exec playwright test

      - name: Stop frontend server
        if: always()
        run: |
          if [ -f /tmp/frontend.pid ]; then
            kill $(cat /tmp/frontend.pid) || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: apps/web/test-results/
          retention-days: 7

      - name: Upload frontend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: /tmp/frontend.log
          retention-days: 7
