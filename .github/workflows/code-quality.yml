name: Code Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-format:
    name: Backend Formatting Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: npm

      - name: Install backend dependencies
        run: |
          npm ci

      - name: Run ESLint
        run: |
          npm -w @glass-code-academy/api run lint

  frontend-lint:
    name: Frontend ESLint Gate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Run ESLint (warnings allowed in CI)
        run: |
          npm -w @glass-code-academy/web run lint
