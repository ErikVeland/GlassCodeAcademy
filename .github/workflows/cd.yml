name: Production Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: glasscode-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://glasscode.academy

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glasscode_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run Unified Quality Gate
        run: ./scripts/quality_gate.sh

      - name: Configure SSH key
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST || '194.195.248.217' }}
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_epstein_prod_ed25519"
          chmod 600 "$HOME/.ssh/id_epstein_prod_ed25519"
          ssh-keyscan -H "$PROD_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy to production
        env:
          GLASSCODE_PROD_HOST: ${{ secrets.PROD_HOST || '194.195.248.217' }}
          GLASSCODE_PROD_USER: ${{ secrets.PROD_USER || 'svc_epstein' }}
        run: ./production/production-deploy.sh
